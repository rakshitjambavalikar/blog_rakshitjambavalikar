{% extends 'blog/base.html' %}


{% block title %}
    Homepage
{% endblock %}


{% block content %}

    <h1>All Blog Posts</h1>

    {% for post in posts %}

        <hr>

        <h2>
            <a href="{% url 'post_detail' post.id %}">
                {{ post.title }}
            </a>
        </h2>

        {% comment %} <p>{{ post.content }}</p> {% endcomment %}

        <small>
            Created on: {{ post.created_at }}
        </small>

    {% endfor %}

{% endblock %}
